<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Thank You - NOTED Notebook</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7a9f48",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div class="relative flex min-h-screen flex-col items-center justify-center p-6">
        <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-10 text-center border border-slate-100 dark:border-slate-800">
            <div class="w-24 h-24 mx-auto bg-green-100 dark:bg-green-900/30 text-green-500 rounded-full flex items-center justify-center mb-8">
                <span class="material-symbols-outlined text-5xl">check_circle</span>
            </div>
            <h1 class="text-3xl font-black mb-4">Thank You!</h1>
            <p class="text-slate-600 dark:text-slate-400 mb-8 leading-relaxed">
                Your order has been successfully placed. We will send the details and tracking information to your email shortly.
            </p>
            <button onclick="window.location.href='/brainstorm-notebook-website/index.html'" class="w-full h-14 rounded-xl bg-primary text-white font-bold text-lg hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">home</span>
                Return to Home
            </button>
        </div>
        <p class="mt-8 text-sm text-slate-500">
            Questions? <a href="#" onclick="alert('Please contact support@notednotebook.com')" class="text-primary hover:underline">Contact Support</a>
        </p>
    </div>
</body>
</html>
